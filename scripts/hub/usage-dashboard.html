<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Token Usage Dashboard</title>
<style>
  :root {
    --bg: #0d1117; --surface: #161b22; --border: #30363d;
    --text: #e6edf3; --muted: #8b949e; --accent: #58a6ff;
    --green: #3fb950; --orange: #d29922;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
         background: var(--bg); color: var(--text); padding: 24px; line-height: 1.5; }
  h1 { font-size: 1.5rem; margin-bottom: 4px; }
  .subtitle { color: var(--muted); font-size: 0.85rem; margin-bottom: 20px; }
  .nav { display: flex; align-items: center; gap: 12px; margin-bottom: 24px; flex-wrap: wrap; }
  .nav button { background: var(--surface); color: var(--text); border: 1px solid var(--border);
                 padding: 6px 14px; border-radius: 6px; cursor: pointer; font-size: 0.85rem; }
  .nav button:hover { border-color: var(--accent); }
  .nav input[type="date"] { background: var(--surface); color: var(--text); border: 1px solid var(--border);
                             padding: 6px 10px; border-radius: 6px; font-size: 0.85rem; }
  .date-label { font-size: 1.1rem; font-weight: 600; }
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: 8px;
          padding: 16px; margin-bottom: 16px; }
  .card h2 { font-size: 1rem; margin-bottom: 12px; color: var(--accent); }
  .card h3 { font-size: 0.9rem; margin: 12px 0 8px; color: var(--muted); }
  table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
  th, td { text-align: right; padding: 6px 10px; border-bottom: 1px solid var(--border); }
  th:first-child, td:first-child { text-align: left; }
  th { color: var(--muted); font-weight: 600; font-size: 0.8rem; text-transform: uppercase; letter-spacing: 0.03em; }
  tr:last-child td { border-bottom: none; }
  .total-row td { font-weight: 600; color: var(--green); }
  .grand-total td { font-weight: 700; color: var(--orange); font-size: 0.9rem; }
  .empty { color: var(--muted); text-align: center; padding: 40px; }
  .loading { color: var(--muted); text-align: center; padding: 40px; }
  #error { color: #f85149; margin-bottom: 16px; display: none; }
  .num { font-variant-numeric: tabular-nums; }
</style>
</head>
<body>

<h1>Token Usage Dashboard</h1>
<p class="subtitle">Daily Claude token consumption across workspaces and workflows</p>

<div class="nav">
  <button id="prev">&larr; Prev</button>
  <span class="date-label" id="current-date">---</span>
  <button id="next">Next &rarr;</button>
  <input type="date" id="picker">
</div>

<div id="error"></div>
<div id="content"><div class="loading">Loading...</div></div>

<script>
const BASE = (function() {
  // Resolve path to usage/ relative to this HTML file's location.
  // The HTML lives at docs/index.html (or root), usage JSONs at usage/*.json.
  const loc = window.location.pathname;
  if (loc.includes('/docs/')) return '../usage';
  return 'usage';
})();

let dates = [];
let currentIdx = 0;

function fmt(n) {
  return (n || 0).toLocaleString();
}

function showError(msg) {
  const el = document.getElementById('error');
  el.textContent = msg;
  el.style.display = msg ? 'block' : 'none';
}

async function loadIndex() {
  try {
    const resp = await fetch(BASE + '/index.json');
    if (!resp.ok) throw new Error('index.json not found');
    const data = await resp.json();
    dates = data.dates || [];
    if (dates.length === 0) {
      document.getElementById('content').innerHTML = '<div class="empty">No usage data available yet.</div>';
      return;
    }
    currentIdx = 0;
    loadDay(dates[currentIdx]);
  } catch (e) {
    showError('Failed to load usage index: ' + e.message);
  }
}

async function loadDay(date) {
  showError('');
  document.getElementById('current-date').textContent = date;
  document.getElementById('picker').value = date;
  try {
    const resp = await fetch(BASE + '/' + date + '.json');
    if (!resp.ok) throw new Error('No data for ' + date);
    const data = await resp.json();
    render(data);
  } catch (e) {
    document.getElementById('content').innerHTML = '<div class="empty">No data for ' + date + '</div>';
  }
}

function tokenRow(label, bucket, cls) {
  return '<tr' + (cls ? ' class="' + cls + '"' : '') + '>' +
    '<td>' + label + '</td>' +
    '<td class="num">' + fmt(bucket.input_tokens) + '</td>' +
    '<td class="num">' + fmt(bucket.output_tokens) + '</td>' +
    '<td class="num">' + fmt(bucket.cache_creation_input_tokens) + '</td>' +
    '<td class="num">' + fmt(bucket.cache_read_input_tokens) + '</td>' +
    '<td class="num">' + fmt(bucket.sessions) + '</td>' +
    '</tr>';
}

function tableHeader() {
  return '<thead><tr><th>Workflow / Model</th><th>Input</th><th>Output</th><th>Cache Create</th><th>Cache Read</th><th>Sessions</th></tr></thead>';
}

function render(data) {
  let html = '';

  // Grand total card
  html += '<div class="card"><h2>Grand Total</h2><table>' + tableHeader() + '<tbody>';
  html += tokenRow('All workspaces', data.grand_total, 'grand-total');
  html += '</tbody></table></div>';

  // Per-workspace cards
  const workspaces = data.workspaces || {};
  for (const [slug, ws] of Object.entries(workspaces).sort()) {
    html += '<div class="card"><h2>' + escHtml(slug) + '</h2>';
    const workflows = ws.workflows || {};
    for (const [wfName, wf] of Object.entries(workflows).sort()) {
      html += '<h3>' + escHtml(wfName) + '</h3>';
      html += '<table>' + tableHeader() + '<tbody>';
      const models = wf.models || {};
      for (const [model, tokens] of Object.entries(models).sort()) {
        html += tokenRow(model, {...tokens, sessions: ''}, '');
      }
      html += tokenRow('Subtotal', {...wf.total, sessions: wf.sessions}, 'total-row');
      html += '</tbody></table>';
    }
    // Workspace total
    html += '<h3>Workspace Total</h3><table>' + tableHeader() + '<tbody>';
    html += tokenRow(slug, ws.total, 'total-row');
    html += '</tbody></table></div>';
  }

  document.getElementById('content').innerHTML = html;
}

function escHtml(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

document.getElementById('prev').addEventListener('click', () => {
  if (currentIdx < dates.length - 1) { currentIdx++; loadDay(dates[currentIdx]); }
});
document.getElementById('next').addEventListener('click', () => {
  if (currentIdx > 0) { currentIdx--; loadDay(dates[currentIdx]); }
});
document.getElementById('picker').addEventListener('change', (e) => {
  const val = e.target.value;
  const idx = dates.indexOf(val);
  if (idx >= 0) { currentIdx = idx; loadDay(dates[currentIdx]); }
  else { loadDay(val); }
});

loadIndex();
</script>
</body>
</html>
