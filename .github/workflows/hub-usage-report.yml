name: Hub Usage Report

# Aggregates daily token usage from hub transcripts into JSON reports
# and publishes a static dashboard via GitHub Pages.  No Claude Code
# invocation — pure Python + git.

on:
  schedule:
    # 04:30 UTC — after other daily workflows have pushed their transcripts
    - cron: '30 4 * * *'
  workflow_dispatch:
    inputs:
      date:
        description: 'Date to aggregate (YYYY-MM-DD). Defaults to yesterday.'
        required: false
        default: ''

jobs:
  usage-report:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Resolve hub config
        id: hub
        run: |
          enabled=$(yq '.hub.enabled // false' auto_tune_config.yml)
          repo=$(yq '.hub.repo // ""' auto_tune_config.yml)
          echo "enabled=$enabled" >> "$GITHUB_OUTPUT"
          echo "repo=$repo" >> "$GITHUB_OUTPUT"

      - name: Check HUB_TOKEN availability
        if: steps.hub.outputs.enabled == 'true' && steps.hub.outputs.repo != ''
        env:
          HUB_TOKEN: ${{ secrets.HUB_TOKEN }}
        run: |
          if [ -z "$HUB_TOKEN" ]; then
            echo "::warning::HUB_TOKEN secret is not provisioned — cannot push usage report."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Clone hub repo
        if: steps.hub.outputs.enabled == 'true' && steps.hub.outputs.repo != ''
        env:
          GH_TOKEN: ${{ secrets.HUB_TOKEN }}
        run: |
          mkdir -p .scratch
          gh repo clone "${{ steps.hub.outputs.repo }}" .scratch/hub -- --depth 200 --no-tags

      - name: Run aggregation
        if: steps.hub.outputs.enabled == 'true' && steps.hub.outputs.repo != ''
        run: |
          DATE="${{ github.event.inputs.date }}"
          if [ -z "$DATE" ]; then
            DATE=$(date -u -d 'yesterday' +%Y-%m-%d)
          fi
          python3 scripts/hub/aggregate-usage.py \
            --hub-dir .scratch/hub \
            --date "$DATE"

      - name: Copy dashboard to hub
        if: steps.hub.outputs.enabled == 'true' && steps.hub.outputs.repo != ''
        run: |
          mkdir -p .scratch/hub/docs
          cp scripts/hub/usage-dashboard.html .scratch/hub/docs/index.html

      - name: Commit and push
        if: steps.hub.outputs.enabled == 'true' && steps.hub.outputs.repo != ''
        env:
          GH_TOKEN: ${{ secrets.HUB_TOKEN }}
        run: |
          cd .scratch/hub
          git add usage/ docs/
          git diff --cached --quiet && { echo "No changes to commit."; exit 0; }

          # Resolve committer identity from token
          LOGIN=$(gh api user --jq '.login' 2>/dev/null || echo 'claude-auto-tune')
          UID_NUM=$(gh api user --jq '.id' 2>/dev/null || echo '0')
          EMAIL="${UID_NUM}+${LOGIN}@users.noreply.github.com"

          DATE="${{ github.event.inputs.date }}"
          if [ -z "$DATE" ]; then
            DATE=$(date -u -d 'yesterday' +%Y-%m-%d)
          fi

          gh auth setup-git
          git -c "user.name=$LOGIN" -c "user.email=$EMAIL" \
            commit -m "usage: aggregate token report for $DATE"
          git push origin main
