name: Auto-Improvement Discover

# Discover half of the split auto-improve system. Parses recent workflow
# logs + Claude Code transcripts, raises/updates tracked issues (with a
# BEFORE-fix baseline snapshot captured at creation), and ships fix PRs
# using "Refs #<num>" so GitHub does not auto-close the issue. Lifecycle
# beyond raised → pr-open is owned by the sibling auto-improve-verify
# workflow, which performs the per-issue before/after comparison.

on:
  schedule:
    # Runs every Sunday at 03:00 UTC
    - cron: '0 3 * * 0'
  workflow_dispatch:
    inputs:
      conversation_limit:
        description: 'Max Claude Code session transcripts to analyze (workflow logs are unlimited)'
        required: false
        default: '20'

jobs:
  auto-improve-discover:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
      actions: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Inject CI sandbox rules into CLAUDE.md
        # CI-only prompt injection. Keeps docs/ci-sandbox-rules.md as the
        # single source of truth while leaving CLAUDE.md clean for local
        # (Docker / IDE) runs that don't hit the allowlist or sandbox.
        # Fixes the recurring pattern tracked in issues #27, #28, #29.
        run: |
          printf '\n\n' >> CLAUDE.md
          cat docs/ci-sandbox-rules.md >> CLAUDE.md

      - name: Resolve model from auto_tune_config.yml
        id: model
        run: |
          alias=$(yq '.models.auto_improve // "opus"' auto_tune_config.yml)
          id=$(yq ".model_aliases.\"$alias\" // \"$alias\"" auto_tune_config.yml)
          echo "id=$id" >> "$GITHUB_OUTPUT"

      - name: Run Auto-Improvement Discover
        uses: anthropics/claude-code-action@1eddb334cfa79fdb21ecbe2180ca1a016e8e7d47  # v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}

          additional_permissions: |
            actions: read

          prompt: |
            Read the file `scripts/auto-improve-discover-prompt.md` — it
            contains your full instructions. You are the **discover** half
            of the split auto-improve tracker: parse recent runs + Claude
            Code transcripts, raise or update tracked issues (capturing a
            BEFORE-fix baseline on creation), and ship focused fix PRs
            using `Refs #<num>` (never `Fixes #`, `Closes #`, or
            `Resolves #`). You must NOT advance issues past pr-open —
            transitions to merged/solved are owned exclusively by the
            sibling auto-improve-verify workflow. For every newly created
            issue, dispatch the verify workflow with that issue number so
            its baseline is confirmed immediately.

            CONVERSATION_LIMIT=${{ github.event.inputs.conversation_limit || '20' }}
            Workflow logs to parse: all discoverable runs (no cap)
            Today's date: $(date +%Y-%m-%d)

          claude_args: >-
            --model ${{ steps.model.outputs.id }}
            --allowed-tools
            Task,
            Bash(gh api:*),
            Bash(gh run:*),
            Bash(gh workflow:*),
            Bash(gh pr:*),
            Bash(gh issue:*),
            Bash(gh label:*),
            Bash(jq:*),
            Bash(git *),
            Bash(python3 *),
            Bash(mkdir *),
            Bash(cat *),
            Bash(echo *),
            Bash(unzip *),
            Bash(wc *),
            Bash(ls *),
            Bash(head *),
            Bash(find *),
            Bash(rm *),
            Read,
            Write,
            Edit,
            Glob,
            Grep

      - name: Upload Claude session transcript
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: claude-transcript
          path: ~/.claude/projects/**/*.jsonl
          if-no-files-found: ignore
          retention-days: 30
