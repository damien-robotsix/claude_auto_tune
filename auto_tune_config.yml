# auto_tune workspace configuration
#
# Model aliases: use "haiku", "sonnet", or "opus" to automatically resolve
# to the latest pinned version of that model family.
# You may also specify a full model ID (e.g. "claude-sonnet-4-6") to pin
# to a specific version.

models:
  # Model used by the main claude.yml workflow
  claude_code: "opus"
  # Model used by the code-review workflow
  code_review: "opus"
  # Model used by the auto-improve discover workflow
  auto_improve: "opus"
  # Model used by the per-issue auto-improve verify workflow
  auto_improve_verify: "opus"

# Alias → full model ID mapping. Update here when new versions are released.
# Scripts fall back to these built-in defaults if this section is absent.
model_aliases:
  haiku: "claude-haiku-4-5-20251001"
  sonnet: "claude-sonnet-4-6"
  opus: "claude-opus-4-6"

auto_improve:
  # Max Claude Code session transcripts to analyze per run. Workflow logs
  # are always analyzed in full (no cap).
  default_conversation_limit: 20
  # Discover workflow cron (weekly): parses recent runs, raises/updates issues.
  schedule: "0 3 * * 0"

auto_improve_verify:
  # Per-issue verify workflow cron (daily): iterates every open auto-improve
  # issue and runs a targeted before/after comparison to decide closure.
  schedule: "0 6 * * *"
