# auto_tune workspace configuration
#
# Model aliases: use "haiku", "sonnet", or "opus" to automatically resolve
# to the latest pinned version of that model family.
# You may also specify a full model ID (e.g. "claude-sonnet-4-6") to pin
# to a specific version.

models:
  # Model used by the main claude.yml workflow
  claude_code: "opus"
  # Model used by the code-review workflow
  code_review: "opus"
  # Model used by the auto-improve discover workflow
  auto_improve: "opus"
  # Model used by the per-issue auto-improve verify workflow
  auto_improve_verify: "opus"
  # Model used by the autonomous claude-agent workflow
  claude_agent: "opus"

# Alias → full model ID mapping. Update here when new versions are released.
# Scripts fall back to these built-in defaults if this section is absent.
model_aliases:
  haiku: "claude-haiku-4-5-20251001"
  sonnet: "claude-sonnet-4-6"
  opus: "claude-opus-4-6"

auto_improve:
  # Max Claude Code session transcripts to analyze per run. Workflow logs
  # are always analyzed in full (no cap).
  default_conversation_limit: 20

# Cross-workspace improvement sharing protocol (issue #32). Phase 1 is
# publish-only: the hub-daily-sweep workflow scans PRs merged into this
# repo's default branch and opens proposal issues in the hub repo for
# generalizable changes. Later phases will add hub-sync (relevance check)
# and hub-report (adoption outcome reporting).
hub:
  # Master switch. When false, the hub-daily-sweep workflow runs but
  # exits immediately without touching the hub repo.
  enabled: true
  # Hub repo slug. All proposals this workspace creates go here.
  repo: "damien-robotsix/claude-auto-tune-hub"
  # Local transcript publishing lane. Reuses the same hub repo as the
  # proposal lane but writes to a disjoint subtree
  # (transcripts/<workspace-slug>/<YYYY-MM-DD>/<session-id>.jsonl) and
  # uses its own scripts (scripts/hub/push-local-transcripts.py). Off
  # by default: when disabled, the push script is a no-op so it is
  # safe to wire unconditionally into run.sh.
  local_transcripts:
    # Master switch for the local-transcript push lane. The script
    # (scripts/hub/push-local-transcripts.py) exits 0 without touching
    # anything when this is false.
    enabled: true
  # CI transcript publishing lane. Pushes Claude Code session transcripts
  # from CI workflow runs to the hub repo alongside local transcripts.
  # This gives the hub a global view of all transcripts across workspaces.
  ci_transcripts:
    enabled: true
